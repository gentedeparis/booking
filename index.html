<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gente de París | Admin V3</title>
    <style>
        :root { --navy: #1B2B4B; --gold: #c9a84c; --bg: #f4f4f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--navy); color: white; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: var(--gold); font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #334; padding-bottom: 10px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--gold); color: var(--navy); font-weight: bold; }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Cards y Tablas */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; background: #eee; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        /* Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-pending { background: #ffeaa7; color: #d6a316; }
        .badge-done { background: #55efc4; color: #00b894; }

        /* Botones */
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--navy); color: white; }
        .btn-assign { background: var(--gold); color: var(--navy); }
        
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Gente de París</h2>
        <div class="nav-item active" onclick="showSection('reservas')">📥 Nuevas Reservas</div>
        <div class="nav-item" onclick="showSection('manager')">🗓️ Tour Manager</div>
        <div class="nav-item" onclick="showSection('tours')">🗺️ Catálogo de Tours</div>
    </div>

    <div class="main">
        
        <div id="sec-reservas" class="section active">
            <h1>Reservas Recibidas</h1>
            <div class="card">
                <table id="tablaReservas">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Cliente</th>
                            <th>Tour</th>
                            <th>Pax</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="sec-manager" class="section">
            <h1>Asignar Jornadas a Guías</h1>
            <div class="card">
                <div style="display:flex; margin-bottom: 20px;">
                    <input type="text" id="tmGuia" placeholder="Nombre del Guía">
                    <input type="date" id="tmFecha">
                    <select id="tmTourSelect">
                        <option value="">Selecciona un tour...</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="guardarJornadaDirecta()">🚀 Crear y Asignar Jornada</button>
            </div>
            
            <div class="card">
                <h3>Jornadas Activas</h3>
                <table id="tablaJornadas">
                    <thead>
                        <tr>
                            <th>Guía</th>
                            <th>Fecha</th>
                            <th>Tour</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="sec-tours" class="section">
            <h1>Configuración de Tours</h1>
            <div class="card">
                <div id="listaToursEdit"></div>
            </div>
        </div>

    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const API = 'TU_URL_DE_APPS_SCRIPT_AQUI';

        // --- 2. MOTOR DE NAVEGACIÓN ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(id === 'reservas') cargarReservas();
            if(id === 'manager') { cargarToursDropdown(); cargarJornadas(); }
        }

        async function apiCall(params) {
            // Para obtener datos usamos GET
            const url = new URL(API);
            Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
            const res = await fetch(url);
            return await res.json();
        }

        async function postCall(params) {
            // Para enviar datos usamos POST
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(params) });
            return await res.json();
        }
