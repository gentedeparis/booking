<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Tour Manager</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; }
        button { background: #1B2B4B; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>Gestionar Jornada</h3>
    <input type="text" id="tmGuia" placeholder="Nombre del Guía">
    <input type="date" id="tmFecha">
    <button onclick="asignarJornada()">Asignar Jornada</button>
</div>

<script>
    // 1. PEGA TU URL DE IMPLEMENTACIÓN AQUÍ:
    var API = 'TU_URL_AQUÍ';

    // 2. Función POST mejorada (la clave para que no fallen las jornadas largas)
    async function apiCall(params) {
        const response = await fetch(API, {
            method: 'POST',
            body: JSON.stringify(params)
        });
        return await response.json();
    }

    // 3. Función para guardar la jornada correctamente
    async function asignarJornada() {
        const guia = document.getElementById('tmGuia').value;
        const fecha = document.getElementById('tmFecha').value;
        
        if(!guia || !fecha) { alert("Rellena todos los campos"); return; }

        const jornada = {
            id: 'JOR-' + guia.toUpperCase().replace(/\s/g,'') + '-' + fecha,
            guia: guia,
            fecha: fecha,
            tourNombre: 'Tour de Prueba', // Ajusta según tus inputs reales
            horario: '10:00',
            clientesJSON: '[]'
        };

        try {
            const res = await apiCall({ action: 'saveJornada', data: jornada });
            if(res.ok) {
                alert("✅ Jornada creada correctamente. El guía ya debería verla.");
            } else {
                alert("❌ Error: " + (res.error || "Desconocido"));
            }
        } catch (e) {
            alert("Error de conexión: " + e);
        }
    }
</script>
</body>
</html>
