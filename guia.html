<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GDP Guía">
<meta name="theme-color" content="#1B2B4B">
<title>Gente de París · Guía</title>
<style>
:root{--noir:#0f0f0f;--charcoal:#1a1a1a;--graphite:#2c2c2c;--smoke:#3d3d3d;--muted:#888;--light:#c8c8c8;--white:#f5f2ec;--gold:#c9a84c;--gold-l:#e8c97a;--green:#27ae60;--red:#c0392b;--blue:#2980b9;--terra:#C4622D;--navy:#1B2B4B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--noir);color:var(--white);font-family:'Segoe UI',Arial,sans-serif;font-weight:300;min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-brand{font-family:Georgia,serif;font-size:1.6rem;color:var(--gold);letter-spacing:0.05em;margin-bottom:6px;text-align:center;}
.login-sub{font-size:0.82rem;color:var(--muted);margin-bottom:36px;text-align:center;}
.login-card{background:var(--charcoal);border:1px solid var(--graphite);border-radius:14px;padding:28px 24px;width:100%;max-width:340px;}
.login-title{font-family:Georgia,serif;font-size:1.1rem;color:var(--white);margin-bottom:6px;text-align:center;}
.login-hint{font-size:0.76rem;color:var(--muted);text-align:center;margin-bottom:20px;}
.pin-input{width:100%;background:var(--graphite);border:2px solid var(--smoke);border-radius:10px;color:var(--white);font-size:2rem;font-weight:700;padding:16px;text-align:center;letter-spacing:0.3em;outline:none;transition:border-color 0.2s;font-family:monospace;}
.pin-input:focus{border-color:var(--gold);}
.pin-input.error{border-color:var(--red);}
.login-btn{width:100%;margin-top:14px;padding:14px;background:var(--gold);color:var(--noir);border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;font-family:'Segoe UI',Arial,sans-serif;}
.login-btn:hover{opacity:0.88;}
.login-btn:disabled{opacity:0.5;cursor:default;}
.login-error{margin-top:12px;text-align:center;font-size:0.82rem;color:var(--red);min-height:20px;}
.app-wrap{display:none;flex-direction:column;min-height:100vh;}
.app-wrap.visible{display:flex;}
.app-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.app-header-info{flex:1;}
.app-header-name{font-family:Georgia,serif;font-size:1.1rem;color:var(--white);}
.app-header-sub{font-size:0.72rem;color:rgba(255,255,255,0.55);margin-top:2px;}
.app-header-actions{display:flex;align-items:center;gap:8px;}
.btn-refresh-app{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:var(--white);font-size:0.8rem;padding:7px 12px;cursor:pointer;}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,0.25);border-radius:6px;color:rgba(255,255,255,0.6);font-size:0.76rem;padding:7px 10px;cursor:pointer;}
.app-tabs{display:flex;background:var(--charcoal);border-bottom:1px solid var(--graphite);flex-shrink:0;}
.app-tab{flex:1;padding:14px 8px;text-align:center;font-size:0.84rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s;user-select:none;}
.app-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.app-content{flex:1;padding:18px;max-width:800px;width:100%;margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.status-bar{display:flex;align-items:center;gap:8px;font-size:0.72rem;color:var(--muted);margin-bottom:16px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.status-dot.ok{background:var(--green);}
.status-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
.status-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.error-banner{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4);border-radius:8px;padding:13px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;}
.error-banner-icon{font-size:1.2rem;flex-shrink:0;}
.error-banner-msg{font-size:0.82rem;color:#e74c3c;flex:1;line-height:1.5;}
.error-banner button{background:none;border:1px solid rgba(192,57,43,0.5);border-radius:6px;color:#e74c3c;font-size:0.76rem;padding:5px 10px;cursor:pointer;margin-top:6px;display:block;}
.jornada-card{background:var(--charcoal);border:1px solid var(--graphite);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.jornada-header{background:var(--navy);padding:14px 16px;cursor:pointer;user-select:none;}
.jornada-title{font-family:Georgia,serif;font-size:1rem;color:var(--white);margin-bottom:3px;}
.jornada-meta{font-size:0.75rem;color:rgba(255,255,255,0.55);}
.jornada-stats{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
.jornada-stat{background:rgba(255,255,255,0.08);border-radius:6px;padding:5px 10px;font-size:0.72rem;color:rgba(255,255,255,0.7);}
.jornada-stat span{color:var(--gold);font-weight:700;font-size:0.9rem;}
.cliente-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.cliente-row:last-child{border-bottom:none;}
.cliente-check{width:22px;height:22px;accent-color:var(--terra);cursor:pointer;flex-shrink:0;}
.cliente-info{flex:1;min-width:0;}
.cliente-nombre{font-size:0.88rem;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cliente-nombre.presente{text-decoration:line-through;opacity:0.5;}
.cliente-pax{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.cliente-wa{color:var(--gold);font-size:0.72rem;text-decoration:none;flex-shrink:0;}
.cliente-row.presente-row{background:rgba(39,174,96,0.05);}
.cliente-vacio{padding:12px 16px;font-size:0.82rem;color:var(--muted);font-style:italic;}
.cliente-edit{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.cliente-edit-input{background:var(--graphite);border:1px solid var(--smoke);border-radius:6px;color:var(--white);font-size:0.78rem;padding:5px 8px;outline:none;font-family:'Segoe UI',Arial,sans-serif;}
.cliente-edit-input:focus{border-color:var(--gold);}
.cliente-edit-input.wide{flex:1;min-width:100px;}
.cliente-edit-input.narrow{width:52px;text-align:center;}
.cliente-del{background:none;border:1px solid rgba(192,57,43,0.4);border-radius:5px;color:rgba(192,57,43,0.7);font-size:0.7rem;padding:3px 7px;cursor:pointer;flex-shrink:0;}
.nuevo-cliente-section{padding:10px 16px;border-top:1px solid var(--graphite);}
.nuevo-cliente-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px;}
.nuevo-cliente-form{display:flex;gap:6px;flex-wrap:wrap;}
.jornada-header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.jornada-chevron{font-size:0.9rem;color:rgba(255,255,255,0.5);margin-left:8px;transition:transform 0.2s;flex-shrink:0;margin-top:2px;}
.jornada-body{display:none;}
.jornada-body.open{display:block;}
.jornada-save-section{padding:12px 16px;border-top:1px solid var(--graphite);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn-guardar-jornada{flex:1;background:var(--terra);color:var(--white);border:none;border-radius:8px;padding:11px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;min-width:140px;}
.btn-guardar-jornada:disabled{opacity:0.5;cursor:default;}
.btn-informe{flex:1;background:var(--navy);color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:11px;font-size:0.84rem;font-weight:600;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;min-width:140px;}
.btn-informe:disabled{opacity:0.5;cursor:default;}
.jornada-save-status{font-size:0.72rem;color:var(--muted);width:100%;text-align:center;}
.autosave-indicator{font-size:0.68rem;color:var(--muted);padding:4px 16px;}
.dossier-mes{background:var(--charcoal);border:1px solid var(--graphite);border-radius:10px;padding:16px;margin-bottom:12px;}
.dossier-mes.pagado{border-color:rgba(39,174,96,0.4);background:rgba(39,174,96,0.04);}
.dossier-mes-title{font-family:Georgia,serif;font-size:1rem;color:var(--white);margin-bottom:3px;}
.dossier-mes-range{font-size:0.72rem;color:var(--muted);margin-bottom:10px;}
.dossier-mes-cred{font-family:Georgia,serif;font-size:1.6rem;font-weight:700;}
.dossier-mes-estado{font-size:0.76rem;margin-top:4px;}
.dossier-entry{background:var(--graphite);border-radius:8px;padding:11px 13px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;}
.dossier-entry-tour{font-size:0.86rem;color:var(--white);font-weight:500;}
.dossier-entry-fecha{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.dossier-entry-cred{font-family:Georgia,serif;font-size:1.1rem;color:var(--gold);font-weight:600;text-align:right;}
.dossier-entry-estado{font-size:0.68rem;text-align:right;margin-top:2px;}
.dossier-sep{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:#7fa7d9;padding:10px 0 6px;border-bottom:1px solid rgba(41,128,185,0.2);margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:2.4rem;margin-bottom:10px;opacity:0.6;}
.empty-hint{font-size:0.76rem;color:var(--muted);margin-top:8px;line-height:1.5;}
.spinner-wrap{text-align:center;padding:40px;}
.spinner{width:34px;height:34px;border:3px solid var(--graphite);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--navy);color:var(--white);padding:11px 20px;border-radius:24px;font-size:0.82rem;font-weight:600;opacity:0;pointer-events:none;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.loading-overlay.open{display:flex;}
.voucher-card{background:var(--charcoal);border:1px solid var(--graphite);border-radius:12px;padding:20px;margin-top:20px;}
.voucher-cliente-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;margin-bottom:6px;border-radius:8px;cursor:pointer;transition:all 0.2s;background:var(--graphite);}
.voucher-cliente-item:hover{background:rgba(201,168,76,0.15);}
.voucher-cliente-info{flex:1;}
.voucher-cliente-nombre{font-size:0.9rem;color:var(--white);font-weight:500;}
.voucher-cliente-pax{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.voucher-cliente-wa{font-size:0.7rem;color:var(--gold);}
.tour-selector{background:var(--graphite);border-radius:10px;padding:16px;margin-bottom:20px;}
.tour-selector select{width:100%;background:var(--charcoal);border:1px solid var(--smoke);border-radius:6px;color:var(--white);font-size:0.9rem;padding:12px;outline:none;font-family:'Segoe UI',Arial,sans-serif;}
.tour-selector select:focus{border-color:var(--gold);}
.fecha-selector{display:flex;gap:10px;margin-top:12px;}
.fecha-selector input{flex:1;background:var(--charcoal);border:1px solid var(--smoke);border-radius:6px;color:var(--white);font-size:0.85rem;padding:10px;outline:none;}
.fecha-selector .cupo-info{background:rgba(201,168,76,0.15);border-radius:6px;padding:10px;font-size:0.75rem;color:var(--gold);text-align:center;min-width:100px;}
.nuevo-cliente-voucher{background:var(--graphite);border-radius:8px;padding:12px;margin-top:16px;margin-bottom:16px;}
.nuevo-cliente-voucher-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.nuevo-cliente-voucher-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.nuevo-cliente-voucher-form input{background:var(--charcoal);border:1px solid var(--smoke);border-radius:6px;color:var(--white);font-size:0.8rem;padding:10px;outline:none;}
.nuevo-cliente-voucher-form input:focus{border-color:var(--gold);}
.btn-generar-voucher{background:var(--gold);color:var(--noir);border:none;border-radius:8px;padding:14px;font-size:0.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:16px;font-family:'Segoe UI',Arial,sans-serif;}
.btn-generar-voucher:hover{opacity:0.88;}
.btn-generar-voucher:disabled{opacity:0.5;cursor:default;}
.btn-agregar-cliente{background:var(--terra);color:var(--white);border:none;border-radius:6px;padding:10px;font-size:0.8rem;font-weight:600;cursor:pointer;width:100%;margin-top:10px;}
.btn-agregar-cliente:hover{opacity:0.88;}
.lista-seleccionados-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;color:var(--muted);margin-top:16px;margin-bottom:10px;}
.seleccionado-item{display:flex;justify-content:space-between;align-items:center;background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:8px;padding:8px 12px;margin-bottom:6px;}
.seleccionado-info{flex:1;}
.seleccionado-nombre{font-size:0.85rem;color:var(--white);font-weight:500;}
.seleccionado-pax{font-size:0.7rem;color:var(--muted);}
.seleccionado-eliminar{background:none;border:none;color:var(--red);font-size:1.2rem;cursor:pointer;padding:0 8px;}
.acordeon-grupo{margin-bottom:12px;border:1px solid var(--smoke);border-radius:8px;overflow:hidden;}
.acordeon-grupo-header{background:var(--navy);padding:8px 12px;font-size:0.8rem;font-weight:600;color:var(--gold);}
.acordeon-grupo-body{padding:4px 0;}
@media(max-width:500px){.app-content{padding:12px;}.jornada-stats{flex-wrap:wrap;}.nuevo-cliente-voucher-form{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-brand">Gente de París</div>
  <div class="login-sub">Portal de Guías</div>
  <div class="login-card">
    <div class="login-title">Acceso</div>
    <div class="login-hint">Introduce tu PIN de 4 dígitos</div>
    <input class="pin-input" type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="····" autocomplete="off">
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<div class="app-wrap" id="appWrap">
  <header class="app-header">
    <div class="app-header-info">
      <div class="app-header-name" id="appGuiaNombre">—</div>
      <div class="app-header-sub" id="appFechaHoy"></div>
    </div>
    <div class="app-header-actions">
      <button class="btn-refresh-app" id="btnRefresh">↻ Actualizar</button>
      <button class="btn-logout" id="btnLogout">Salir</button>
    </div>
  </header>
  <div class="app-tabs">
    <div class="app-tab active" data-tab="jornadas">📋 Mis Jornadas</div>
    <div class="app-tab" data-tab="dossier">📁 Mi Dossier</div>
    <div class="app-tab" data-tab="voucher">🎫 Generar Voucher</div>
  </div>
  <div class="app-content">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Conectando...</span>
    </div>
    <div class="tab-panel active" id="panel-jornadas">
      <div id="jornadasError" style="display:none"></div>
      <div id="jornadasContent"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>
    <div class="tab-panel" id="panel-dossier">
      <div id="dossierContent"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>
    <div class="tab-panel" id="panel-voucher">
      <div style="margin-bottom:20px">
        <h1 style="font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--white)">🎫 Generar Voucher de Reserva</h1>
        <p style="color:var(--muted);font-size:0.85rem;margin-top:4px">Crea un voucher para que un cliente reserve un tour</p>
      </div>
      <div id="voucherContainer"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbxclPkEfE7mTvy-MyEJMBYoCyZWkCdgDeYWawcSgYHMJzez9l1fibOxydDuMM0Goixl/exec';
const ADMIN_WA = '33760940851';
const REFRESH_INTERVAL = 3 * 60 * 1000;

let guiaNombre = '';
let jornadasData = [];
let dossierData = [];
let pagosData = [];
let presencia = {};
let jornadaOpen = {};
let saveTimers = {};
let refreshTimer = null;
let activeTab = 'jornadas';
let toursActivos = [];
let cuposDisponibles = {};
let voucherTourSeleccionado = null;
let voucherFechaSeleccionada = null;
let voucherClientesSeleccionados = [];

function apiCall(params) {
  return fetch(API, { method: 'POST', body: JSON.stringify(params) })
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      if (txt.trim().charAt(0) !== '{' && txt.trim().charAt(0) !== '[') throw new Error('Respuesta inesperada');
      var result = JSON.parse(txt);
      if (result && result.error) throw new Error(result.error);
      return result;
    });
}

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function normalizeId(str){ return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,''); }
function normalizarFecha(val) { if (!val) return ''; var s=String(val).trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s; try{ var d=new Date(s); if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }catch(e){} return s; }
function normalizarHorario(val) { if (!val) return ''; var s=String(val).trim(); if(/^\d{1,2}:\d{2}$/.test(s)) return s; try{ var d=new Date(s); if(!isNaN(d.getTime())) return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }catch(e){} return s; }
function formatDate(str){ if(!str)return''; var s=normalizarFecha(String(str)); if(!s)return String(str); var p=s.split('-'); var mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(p[1])-1]; return mn?parseInt(p[2])+' '+mn+' '+p[0]:s; }
function formatDateNice(str){ if(!str)return''; var p=str.split('-'); var months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']; return parseInt(p[2])+' de '+months[parseInt(p[1])-1]+' de '+p[0]; }
function formatDateDDMMYYYY(str){ if(!str)return''; var s=normalizarFecha(String(str)); if(!s)return String(str); var p=s.split('-'); return String(parseInt(p[2])).padStart(2,'0')+'/'+String(parseInt(p[1])).padStart(2,'0')+'/'+p[0]; }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }
function setStatus(state,text){ document.getElementById('statusDot').className='status-dot '+state; document.getElementById('statusText').textContent=text; }
function hoy(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function formatHoy(){ var d=new Date(); var months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']; var days=['domingo','lunes','martes','miércoles','jueves','viernes','sábado']; return days[d.getDay()]+', '+d.getDate()+' de '+months[d.getMonth()]; }
function showLoading() { document.getElementById('loadingOverlay').classList.add('open'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('open'); }

function showJornadasError(errMsg){ var el=document.getElementById('jornadasError'); el.style.display='block'; el.innerHTML='<div class="error-banner"><div class="error-banner-icon">⚠️</div><div class="error-banner-msg"><strong>No se pudieron cargar las jornadas</strong><br>'+escH(errMsg)+'<br><button onclick="loadAll()">↻ Reintentar</button></div></div>'; }
function clearJornadasError(){ var el=document.getElementById('jornadasError'); el.style.display='none'; el.innerHTML=''; }

function doLogin() {
  var pin = document.getElementById('pinInput').value.trim();
  var errEl = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  if (!/^[0-9]{4}$/.test(pin)) { errEl.textContent = 'El PIN debe tener 4 dígitos'; document.getElementById('pinInput').classList.add('error'); return; }
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  apiCall({ action: 'verificarPIN', pin: pin })
    .then(function(resp) { if(resp && resp.ok){ guiaNombre = resp.guia; enterApp(); } else { document.getElementById('pinInput').classList.add('error'); errEl.textContent = 'PIN incorrecto'; document.getElementById('pinInput').value = ''; document.getElementById('pinInput').focus(); } })
    .catch(function(e) { errEl.textContent = 'Error de conexión: ' + e.message; })
    .finally(function() { btn.disabled = false; btn.textContent = 'Entrar'; });
}

function enterApp() { 
  document.getElementById('loginWrap').style.display = 'none'; 
  document.getElementById('appWrap').classList.add('visible'); 
  document.getElementById('appGuiaNombre').textContent = '👋 ' + guiaNombre; 
  document.getElementById('appFechaHoy').textContent = formatHoy(); 
  loadAll(); 
  startAutoRefresh(); 
}
function logout() { guiaNombre = ''; jornadasData = []; dossierData = []; pagosData = []; presencia = {}; stopAutoRefresh(); document.getElementById('appWrap').classList.remove('visible'); document.getElementById('loginWrap').style.display = 'flex'; document.getElementById('pinInput').value = ''; document.getElementById('pinInput').classList.remove('error'); document.getElementById('loginError').textContent = ''; clearJornadasError(); }

function parseJornadas(raw) {
  return (Array.isArray(raw) ? raw : []).map(function(j) {
    var clientes = [];
    if (j.clientesJSON && typeof j.clientesJSON === 'string' && j.clientesJSON.trim() !== '') {
      try { clientes = JSON.parse(j.clientesJSON); } catch(e) { clientes = []; }
    } else if (Array.isArray(j.clientes)) { clientes = j.clientes; }
    return Object.assign({}, j, { fecha: normalizarFecha(j.fecha), horario: normalizarHorario(j.horario), clientes: clientes });
  });
}

function loadAll() {
  setStatus('loading', 'Cargando datos...');
  clearJornadasError();
  document.getElementById('jornadasContent').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  Promise.all([
    apiCall({ action: 'getJornadasGuia', guia: guiaNombre, includePast: 'true' }),
    apiCall({ action: 'getDossier', guia: guiaNombre }),
    apiCall({ action: 'getPagosSemana', guia: guiaNombre })
  ]).then(function(results) {
    jornadasData = parseJornadas(results[0]);
    jornadasData.forEach(function(j) {
      (j.clientes || []).forEach(function(c, ci) { presencia[j.id + '_' + ci] = !!c.present; });
    });
    dossierData = Array.isArray(results[1]) ? results[1].map(function(e) { return Object.assign({}, e, { fecha: normalizarFecha(e.fecha), horario: normalizarHorario(e.horario) }); }) : [];
    pagosData = Array.isArray(results[2]) ? results[2] : [];
    setStatus('ok', 'Actualizado · ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}));
    renderJornadas();
    renderDossier();
    cargarToursActivos();
  }).catch(function(e) { setStatus('error', 'Error al cargar'); showJornadasError(e.message || 'Error de conexión'); document.getElementById('jornadasContent').innerHTML = ''; });
}

function loadJornadas() {
  setStatus('loading', 'Actualizando...');
  apiCall({ action: 'getJornadasGuia', guia: guiaNombre, includePast: 'true' }).then(function(raw) {
    jornadasData = parseJornadas(raw);
    jornadasData.forEach(function(j) {
      (j.clientes || []).forEach(function(c, ci) { presencia[j.id + '_' + ci] = !!c.present; });
    });
    clearJornadasError();
    setStatus('ok', 'Actualizado · ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}));
    renderJornadas();
  }).catch(function(e) { setStatus('error', 'Error al actualizar'); showJornadasError(e.message || 'Error de conexión'); });
}

async function cargarToursActivos() {
  try {
    const resp = await apiCall({ action: 'getTours' });
    toursActivos = (Array.isArray(resp) ? resp : []).filter(function(t) {
      return (t.activo === true || t.activo === 'true' || t.activo === 'TRUE') && !(t.interno === true || t.interno === 'true');
    });
    const cuposResp = await apiCall({ action: 'getCupos' });
    cuposDisponibles = (cuposResp && typeof cuposResp === 'object') ? cuposResp : {};
    renderVoucherPanel();
  } catch(e) {
    const container = document.getElementById('voucherContainer');
    if(container) container.innerHTML = '<div class="error-banner" style="margin-top:20px"><div class="error-banner-icon">⚠️</div><div class="error-banner-msg">Error cargando tours: ' + escH(e.message) + '<br><button onclick="cargarToursActivos()">↻ Reintentar</button></div></div>';
  }
}

function getCupoRestante(tourId, fecha) {
  const usado = cuposDisponibles[fecha + '_' + tourId] || 0;
  const tour = toursActivos.find(function(t) { return String(t.id) === String(tourId); });
  const cupoMax = tour ? parseInt(tour.cupo) || 15 : 15;
  return cupoMax - usado;
}

function preseleccionarTourActual() {
  const hoyStr = hoy();
  const jornadaHoy = jornadasData.find(function(j) { return j.fecha === hoyStr; });
  if (jornadaHoy && jornadaHoy.tourId) {
    const select = document.getElementById('voucherTourSelect');
    if (select) {
      select.value = jornadaHoy.tourId;
      onVoucherTourChange();
    }
  }
}

function renderVoucherPanel() {
  const container = document.getElementById('voucherContainer');
  if (!container) return;
  if (!toursActivos.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎫</div><div>No hay tours activos disponibles.</div><div class="empty-hint">El administrador debe activar tours desde el panel de admin.</div></div>';
    return;
  }
  let html = `
    <div class="tour-selector">
      <label style="display:block;font-size:0.7rem;text-transform:uppercase;color:var(--muted);margin-bottom:6px">🎯 Selecciona un tour</label>
      <select id="voucherTourSelect" onchange="onVoucherTourChange()">
        <option value="">— Selecciona un tour —</option>
        ${toursActivos.map(function(t) {
          return '<option value="' + escH(t.id) + '" data-nombre="' + escH(t.nombre) + '" data-horario="' + escH(t.horario || '') + '" data-precio="' + (t.precio || 20) + '" data-cupo="' + (t.cupo || 15) + '" data-direccion="' + escH(t.direccion || '') + '" data-maps="' + escH(t.mapsLink || '') + '">' + escH(t.nombre) + ' · ' + (t.horario || '--') + '</option>';
        }).join('')}
      </select>
      <div class="fecha-selector">
        <input type="date" id="voucherFecha" onchange="onVoucherFechaChange()">
        <div id="voucherCupoInfo" class="cupo-info">Selecciona fecha</div>
      </div>
    </div>
    <div id="voucherClienteSection" style="display:none">
      <div style="margin-top:16px;margin-bottom:12px">
        <label style="font-size:0.7rem;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block">👥 Clientes de tu jornada de hoy (haz clic para seleccionar)</label>
        <div id="voucherClientesAcordeon"></div>
      </div>
      <div style="margin-top:20px;margin-bottom:12px">
        <label style="font-size:0.7rem;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block">➕ Agregar nuevo cliente manualmente</label>
        <div class="nuevo-cliente-voucher-form">
          <input type="text" id="voucherNuevoNombre" placeholder="Nombre completo *">
          <input type="tel" id="voucherNuevoWhatsapp" placeholder="WhatsApp *">
          <input type="email" id="voucherNuevoEmail" placeholder="Email (opcional)">
          <input type="number" id="voucherNuevoAdultos" placeholder="Adultos" min="1" value="1">
          <input type="number" id="voucherNuevoMenores" placeholder="Menores" min="0" value="0">
        </div>
        <button class="btn-agregar-cliente" onclick="agregarClienteNuevoALista()">+ Agregar nuevo cliente a la lista</button>
      </div>
      <div id="voucherClientesSeleccionados"></div>
      <button class="btn-generar-voucher" id="btnGenerarVoucher" onclick="generarVoucher()" disabled>🎫 Generar Voucher</button>
    </div>
  `;
  container.innerHTML = html;
  preseleccionarTourActual();
}

function renderClientesAcordeon() {
  const container = document.getElementById('voucherClientesAcordeon');
  if (!container) return;
  const hoyStr = hoy();
  const jornadasHoy = jornadasData.filter(function(j) { return j.fecha === hoyStr; });
  if (!jornadasHoy.length) {
    container.innerHTML = '<div style="font-size:0.8rem;color:var(--muted);padding:10px;text-align:center">No hay jornadas asignadas para hoy.</div>';
    return;
  }
  let html = '';
  jornadasHoy.forEach(function(jornada, idxJ) {
    if (!jornada.clientes || !jornada.clientes.length) return;
    html += '<div class="acordeon-grupo">';
    html += '<div class="acordeon-grupo-header">🎯 ' + escH(jornada.tourNombre || 'Sin tour') + ' · ' + (jornada.horario || '--') + '</div>';
    html += '<div class="acordeon-grupo-body">';
    jornada.clientes.forEach(function(cliente, idxC) {
      if (!cliente.name) return;
      html += `
        <div class="voucher-cliente-item" onclick="seleccionarClienteExistente('${idxJ}', '${idxC}')">
          <div class="voucher-cliente-info">
            <div class="voucher-cliente-nombre">${escH(cliente.name)}</div>
            <div class="voucher-cliente-pax">👥 ${cliente.adults || 0} adultos, ${cliente.minors || 0} menores</div>
            ${cliente.wa ? '<div class="voucher-cliente-wa">📱 ' + escH(cliente.wa) + '</div>' : ''}
          </div>
          <div style="font-size:0.7rem;color:var(--gold);">Seleccionar →</div>
        </div>
      `;
    });
    html += '</div></div>';
  });
  if (html === '') {
    container.innerHTML = '<div style="font-size:0.8rem;color:var(--muted);padding:10px;text-align:center">No hay clientes en tus jornadas de hoy.</div>';
  } else {
    container.innerHTML = html;
  }
}

function seleccionarClienteExistente(idxJ, idxC) {
  const hoyStr = hoy();
  const jornadasHoy = jornadasData.filter(function(j) { return j.fecha === hoyStr; });
  const jornada = jornadasHoy[idxJ];
  if (!jornada || !jornada.clientes[idxC]) return;
  const cliente = jornada.clientes[idxC];
  voucherClientesSeleccionados.push({
    nombre: cliente.name,
    whatsapp: cliente.wa || '',
    email: '',
    adultos: parseInt(cliente.adults) || 1,
    menores: parseInt(cliente.minors) || 0
  });
  actualizarListaClientesSeleccionados();
  showToast('Cliente ' + cliente.name + ' agregado al voucher');
  habilitarBotonGenerar();
}

function agregarClienteNuevoALista() {
  const nombre = document.getElementById('voucherNuevoNombre')?.value.trim();
  const whatsapp = document.getElementById('voucherNuevoWhatsapp')?.value.trim();
  const email = document.getElementById('voucherNuevoEmail')?.value.trim();
  const adultos = parseInt(document.getElementById('voucherNuevoAdultos')?.value) || 1;
  const menores = parseInt(document.getElementById('voucherNuevoMenores')?.value) || 0;
  if (!nombre) { showToast('Escribe el nombre del cliente'); return; }
  if (!whatsapp) { showToast('Escribe el WhatsApp del cliente'); return; }
  voucherClientesSeleccionados.push({ nombre: nombre, whatsapp: whatsapp, email: email, adultos: adultos, menores: menores });
  actualizarListaClientesSeleccionados();
  document.getElementById('voucherNuevoNombre').value = '';
  document.getElementById('voucherNuevoWhatsapp').value = '';
  document.getElementById('voucherNuevoEmail').value = '';
  document.getElementById('voucherNuevoAdultos').value = '1';
  document.getElementById('voucherNuevoMenores').value = '0';
  habilitarBotonGenerar();
  showToast('Cliente agregado a la lista ✓');
}

function actualizarListaClientesSeleccionados() {
  const container = document.getElementById('voucherClientesSeleccionados');
  if (!voucherClientesSeleccionados.length) {
    container.innerHTML = '<div class="lista-seleccionados-title">📋 Clientes seleccionados</div><div style="font-size:0.75rem;color:var(--muted);padding:10px 0">No hay clientes seleccionados. Agrega al menos uno.</div>';
    return;
  }
  let html = '<div class="lista-seleccionados-title">📋 Clientes seleccionados (' + voucherClientesSeleccionados.length + ')</div>';
  voucherClientesSeleccionados.forEach(function(c, idx) {
    html += `
      <div class="seleccionado-item">
        <div class="seleccionado-info">
          <div class="seleccionado-nombre">${escH(c.nombre)}</div>
          <div class="seleccionado-pax">👥 ${c.adultos} adultos, ${c.menores} menores | 📱 ${escH(c.whatsapp)}</div>
        </div>
        <button class="seleccionado-eliminar" onclick="eliminarClienteSeleccionado(${idx})">✕</button>
      </div>
    `;
  });
  container.innerHTML = html;
}

function eliminarClienteSeleccionado(idx) {
  voucherClientesSeleccionados.splice(idx, 1);
  actualizarListaClientesSeleccionados();
  habilitarBotonGenerar();
}

function habilitarBotonGenerar() {
  const btn = document.getElementById('btnGenerarVoucher');
  if (btn) btn.disabled = voucherClientesSeleccionados.length === 0 || !voucherFechaSeleccionada || !voucherTourSeleccionado;
}

function onVoucherTourChange() {
  const select = document.getElementById('voucherTourSelect');
  const tourId = select.value;
  if (!tourId) {
    voucherTourSeleccionado = null;
    document.getElementById('voucherClienteSection').style.display = 'none';
    return;
  }
  const tour = toursActivos.find(function(t) { return String(t.id) === String(tourId); });
  voucherTourSeleccionado = tour;
  document.getElementById('voucherClienteSection').style.display = 'block';
  renderClientesAcordeon();
  onVoucherFechaChange();
}

function onVoucherFechaChange() {
  const fechaInput = document.getElementById('voucherFecha');
  const fecha = fechaInput.value;
  voucherFechaSeleccionada = fecha;
  if (fecha && voucherTourSeleccionado) {
    const cupoRestante = getCupoRestante(voucherTourSeleccionado.id, fecha);
    const cupoInfo = document.getElementById('voucherCupoInfo');
    if (cupoInfo) cupoInfo.innerHTML = cupoRestante > 0 ? '✅ ' + cupoRestante + ' plazas disponibles' : '❌ Sin plazas disponibles';
    if (cupoRestante <= 0) {
      showToast('No hay plazas disponibles para esta fecha');
      document.getElementById('btnGenerarVoucher').disabled = true;
    } else {
      habilitarBotonGenerar();
    }
  }
  habilitarBotonGenerar();
}

function generarVoucher() {
  if (!voucherTourSeleccionado || !voucherFechaSeleccionada || !voucherClientesSeleccionados.length) {
    showToast('Completa todos los datos');
    return;
  }
  const btn = document.getElementById('btnGenerarVoucher');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';
  showLoading();
  const reservasPromises = voucherClientesSeleccionados.map(function(cliente) {
    const paxTotal = (cliente.adultos || 0) + (cliente.menores || 0);
    const precioUnitario = parseFloat(voucherTourSeleccionado.precio) || 20;
    const total = paxTotal * precioUnitario;
    const reserva = {
      id: 'res_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      fecha: voucherFechaSeleccionada,
      tourId: voucherTourSeleccionado.id,
      tourNombre: voucherTourSeleccionado.nombre,
      horario: voucherTourSeleccionado.horario || '',
      nombre: cliente.nombre,
      whatsapp: cliente.whatsapp,
      email: cliente.email || '',
      adultos: cliente.adultos || 0,
      menores: cliente.menores || 0,
      total: total,
      precioUnitario: precioUnitario,
      timestamp: new Date().toISOString(),
      creadoPor: guiaNombre,
      estado: 'confirmada'
    };
    return apiCall({ action: 'saveReserva', data: reserva }).then(function() { return reserva; });
  });
  Promise.all(reservasPromises).then(function(reservasGuardadas) {
    hideLoading();
    showToast('✓ ' + reservasGuardadas.length + ' reserva(s) creada(s)');
    generarYDescargarVoucher(reservasGuardadas);
    reservasGuardadas.forEach(function(r) {
      if (r.email && r.email.trim()) {
        enviarEmailVoucher(r);
      }
      const waLink = 'https://wa.me/' + r.whatsapp.replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent('Hola ' + r.nombre + ', tu voucher de reserva ha sido generado. Adjunto encontrarás el archivo. ¡Gracias por confiar en Gente de París! 🗼');
      window.open(waLink, '_blank');
    });
    btn.disabled = false;
    btn.textContent = '🎫 Generar Voucher';
    voucherClientesSeleccionados = [];
    actualizarListaClientesSeleccionados();
    document.getElementById('voucherFecha').value = '';
    voucherFechaSeleccionada = null;
    habilitarBotonGenerar();
  }).catch(function(e) {
    hideLoading();
    showToast('Error al guardar: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🎫 Generar Voucher';
  });
}

function enviarEmailVoucher(reserva) {
  const htmlVoucher = generarHTMLVoucher(reserva);
  apiCall({
    action: 'enviarEmail',
    data: {
      destinatario: reserva.email,
      asunto: 'Tu voucher de reserva - Gente de París',
      cuerpo: 'Hola ' + reserva.nombre + ',\n\nAdjunto encontrarás tu voucher de reserva.\n\nGracias por confiar en Gente de París.\n\n🗼 El equipo de Gente de París',
      adjuntoHtml: htmlVoucher,
      nombreArchivo: 'voucher-' + reserva.id + '.html'
    }
  }).catch(function(e) { console.warn('Error enviando email:', e); });
}

function generarYDescargarVoucher(reservas) {
  const primeraReserva = reservas[0];
  const totalGeneral = reservas.reduce(function(s, r) { return s + ((r.adultos + r.menores) * (parseFloat(voucherTourSeleccionado.precio) || 20)); }, 0);
  const encuentroHTML = voucherTourSeleccionado.direccion ? '<div class="row"><span class="key">📍 Punto de encuentro</span><span class="val">' + escH(voucherTourSeleccionado.direccion) + (voucherTourSeleccionado.mapsLink ? ' &nbsp;<a href="' + voucherTourSeleccionado.mapsLink + '" target="_blank" style="color:#b8860b">Ver en Maps →</a>' : '') + '</span></div>' : '';
  let clientesHTML = '<div style="margin-top:16px;margin-bottom:8px"><strong>👥 Clientes incluidos:</strong></div>';
  reservas.forEach(function(r, idx) {
    clientesHTML += '<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:0.85rem">' + (idx+1) + '. ' + escH(r.nombre) + ' · ' + (r.adultos || 0) + 'A, ' + (r.menores || 0) + 'M · 📱 ' + escH(r.whatsapp) + '</div>';
  });

function guardarClientesJornada(jornadaId, gi, isAuto) {
  var btn = document.getElementById('btn-guardar-' + gi);
  var statusEl = document.getElementById('save-status-' + gi);
  var indicator = document.getElementById('autosave-' + gi);
  if (!isAuto && btn) { btn.disabled = true; btn.textContent = '⏳ Guardando...'; }
  var j = jornadasData.find(function(x) { return x.id === jornadaId; });
  if (!j) { if (btn) { btn.disabled = false; btn.textContent = '💾 Guardar cambios'; } return; }
  var clientes = [];
  var rows = document.querySelectorAll('[data-jornada-id="' + jornadaId + '"][data-cliente-idx]');
  rows.forEach(function(row) {
    var ci = row.getAttribute('data-cliente-idx');
    var nameEl = document.getElementById('cn-' + jornadaId + '-' + ci);
    var adEl   = document.getElementById('ca-' + jornadaId + '-' + ci);
    var menEl  = document.getElementById('cm-' + jornadaId + '-' + ci);
    var waEl   = document.getElementById('cw-' + jornadaId + '-' + ci);
    if (!nameEl) return;
    clientes.push({
      name:   nameEl.value.trim() || (j.clientes[ci] ? j.clientes[ci].name : '—'),
      adults: parseInt(adEl ? adEl.value : 0) || 0,
      minors: parseInt(menEl ? menEl.value : 0) || 0,
      wa:     waEl ? waEl.value.trim() : '',
      present: !!presencia[jornadaId + '_' + ci],
      walkin: false
    });
  });
  apiCall({ action: 'updateJornadaClientes', id: jornadaId, data: clientes })
    .then(function() {
      j.clientes = clientes;
      clientes.forEach(function(c, ci) { presencia[jornadaId + '_' + ci] = !!c.present; });
      if (btn) { btn.disabled = false; btn.textContent = '💾 Guardar'; }
      if (indicator) { indicator.textContent = isAuto ? '✅ Guardado automáticamente' : ''; setTimeout(function(){ if(indicator) indicator.textContent=''; }, 3000); }
      if (statusEl) { statusEl.textContent = isAuto ? '' : '✅ Guardado'; setTimeout(function(){ if(statusEl) statusEl.textContent=''; }, 3000); }
      if (!isAuto) showToast('Cambios guardados ✓');
      if (!isAuto) renderJornadas();
    })
    .catch(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '💾 Guardar'; }
      if (indicator) indicator.textContent = '❌ Error al guardar';
      if (statusEl) statusEl.textContent = '❌ Error al guardar';
      showToast('Error: ' + e.message);
    });
}

function scheduleAutoSave(jornadaId, gi) {
  var indicator = document.getElementById('autosave-' + gi);

function renderDossier() { var el = document.getElementById('dossierContent'); if (!dossierData.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div>Sin registros aún.</div></div>'; return; } var byMonth = {}; var mesMap = {}; dossierData.forEach(function(e) { if (!e.fecha) return; var fn = normalizarFecha(e.fecha); if (!fn) return; var p = fn.split('-'); var mkey = p[0] + '-' + p[1]; if (!byMonth[mkey]) byMonth[mkey] = []; byMonth[mkey].push(e); if (!mesMap[mkey]) { var lastDay = new Date(parseInt(p[0]), parseInt(p[1]), 0).getDate(); mesMap[mkey] = { inicio: p[0]+'-'+p[1]+'-01', fin: p[0]+'-'+p[1]+'-'+String(lastDay).padStart(2,'0'), total: 0, pagado: 0 }; } mesMap[mkey].total += parseFloat(e.creditos) || 0; if (e.estadoPago === 'pagado') mesMap[mkey].pagado += parseFloat(e.creditos) || 0; }); var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']; var monthsShort = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; var nowM = new Date(); var mesActualGuia = nowM.getFullYear() + '-' + String(nowM.getMonth()+1).padStart(2,'0'); var html = ''; html += '<div style="margin-bottom:24px;">'; var totalGlobal = Object.keys(mesMap).reduce(function(s,k){return s+mesMap[k].total;},0); var pagadoGlobal = Object.keys(mesMap).reduce(function(s,k){return s+mesMap[k].pagado;},0); var pendienteGlobal = totalGlobal - pagadoGlobal; html += '<div style="font-family:Georgia,serif;font-size:1rem;color:var(--white);margin-bottom:12px;">📅 Score mensual</div>'; html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">'; html += '<div style="background:var(--graphite);border:1px solid var(--smoke);border-radius:8px;padding:12px;text-align:center"><div style="font-family:Georgia,serif;font-size:1.3rem;color:var(--white)">' + (totalGlobal % 1 === 0 ? totalGlobal : totalGlobal.toFixed(2)) + ' cr.</div><div style="font-size:.66rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em">Total</div></div>'; html += '<div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:12px;text-align:center"><div style="font-family:Georgia,serif;font-size:1.3rem;color:var(--gold)">' + (pendienteGlobal % 1 === 0 ? pendienteGlobal : pendienteGlobal.toFixed(2)) + ' cr.</div><div style="font-size:.66rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em">⏳ Pendiente</div></div>'; html += '<div style="background:rgba(39,174,96,.06);border:1px solid rgba(39,174,96,.3);border-radius:8px;padding:12px;text-align:center"><div style="font-family:Georgia,serif;font-size:1.3rem;color:var(--green)">' + (pagadoGlobal % 1 === 0 ? pagadoGlobal : pagadoGlobal.toFixed(2)) + ' cr.</div><div style="font-size:.66rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em">✅ Cobrado</div></div>'; html += '</div>'; Object.keys(mesMap).sort().reverse().forEach(function(mkey) { var sm = mesMap[mkey]; var pend = sm.total - sm.pagado; var todo = (pend === 0 && sm.total > 0); var p = mkey.split('-'); var nm = monthNames[parseInt(p[1])-1] + ' ' + p[0]; html += '<div class="dossier-mes' + (todo ? ' pagado' : '') + '">'; html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'; html += '<div><div class="dossier-mes-title">' + nm + '</div>'; html += '<div class="dossier-mes-range">' + formatDate(sm.inicio) + ' → ' + formatDate(sm.fin) + '</div></div>'; html += '<div style="text-align:right;">'; html += '<div class="dossier-mes-cred" style="color:' + (todo ? 'var(--green)' : 'var(--gold)') + '">' + sm.total + ' cr.</div>'; if (todo) { html += '<div class="dossier-mes-estado" style="color:var(--green);">✅ Todo cobrado</div>'; } else { html += '<div class="dossier-mes-estado" style="color:var(--gold);">⏳ ' + pend + ' pend.</div>'; if (sm.pagado > 0) html += '<div class="dossier-mes-estado" style="color:var(--green);">✅ ' + sm.pagado + ' cob.</div>'; } html += '</div></div></div>'; }); html += '</div>'; html += '<div style="font-family:Georgia,serif;font-size:1rem;color:var(--white);margin-bottom:14px;">📋 Historial de tours</div>'; Object.keys(byMonth).sort().reverse().forEach(function(mkey) { var p = mkey.split('-'); var nm = (monthsShort[parseInt(p[1])-1]||'').toUpperCase() + ' ' + p[0]; var isCurr = (mkey === mesActualGuia); var acId = 'gm-' + mkey.replace('-','_'); html += '<div class="dossier-sep" onclick="toggleGuiaMes(\'' + acId + '\')">'; html += '<span>/////// ' + nm + ' ///////</span>'; html += '<span id="garr-' + acId + '">' + (isCurr ? '▲' : '▼') + '</span></div>'; html += '<div id="' + acId + '" style="display:' + (isCurr ? 'block' : 'none') + '">'; byMonth[mkey].sort(function(a,b) { return a.fecha > b.fecha ? -1 : 1; }).forEach(function(e) { var ep = e.estadoPago || 'pendiente'; var ip = (ep === 'pagado'); html += '<div class="dossier-entry">'; html += '<div><div class="dossier-entry-tour">' + escH(e.tourNombre||'—') + '</div>'; html += '<div class="dossier-entry-fecha">' + formatDateDDMMYYYY(normalizarFecha(e.fecha)) + (e.horario ? ' · ' + e.horario : '') + '</div>'; html += '<div class="dossier-entry-fecha" style="margin-top:3px;">PAX: ' + (e.paxTotal||0) + ' · Asist: ' + (e.asistentes||0) + '</div></div>'; html += '<div><div class="dossier-entry-cred" style="color:' + (ip ? 'var(--green)' : 'var(--gold)') + '">' + (e.creditos||0) + '</div>'; html += '<div class="dossier-entry-estado" style="color:' + (ip ? 'var(--green)' : 'var(--gold)') + '">' + (ip ? '✅' : '⏳') + '</div></div>'; html += '</div>'; }); html += '</div>'; }); el.innerHTML = html; }

function toggleGuiaMes(id){ var body=document.getElementById(id); if(!body) return; var arr=document.getElementById('garr-'+id); var isOpen=body.style.display!=='none'; body.style.display=isOpen?'none':'block'; if(arr) arr.innerHTML=isOpen?'▼':'▲'; }

document.addEventListener('click', function(e) {
  if (e.target.id === 'loginBtn') { doLogin(); return; }
  if (e.target.id === 'btnLogout') { if (confirm('¿Cerrar sesión?')) logout(); return; }
  if (e.target.id === 'btnRefresh') { loadAll(); return; }
  var tab = e.target.closest('.app-tab');
  if (tab) { var tabName = tab.getAttribute('data-tab'); document.querySelectorAll('.app-tab').forEach(function(t) { t.classList.remove('active'); }); document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); }); tab.classList.add('active'); document.getElementById('panel-' + tabName).classList.add('active'); activeTab = tabName; if (tabName === 'voucher') cargarToursActivos(); return; }
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.getAttribute('data-action');
  var gi = btn.getAttribute('data-gi');
  if (action === 'guardarclientesjornada') { var jid = btn.getAttribute('data-jid'); guardarClientesJornada(jid, gi); return; }
  if (action === 'enviarinforme') { var jid = btn.getAttribute('data-jid'); if (confirm('¿Enviar el informe de asistencia al administrador?')) { enviarInforme(jid, gi); } return; }
  if (action === 'addcliente') { var jid = btn.getAttribute('data-jid'); var nombreEl = document.getElementById('nc-nombre-' + gi); var adEl = document.getElementById('nc-ad-' + gi); var menEl = document.getElementById('nc-men-' + gi); var waEl = document.getElementById('nc-wa-' + gi); var nombre = nombreEl ? nombreEl.value.trim() : ''; if (!nombre) { showToast('Escribe el nombre del cliente'); return; } var j = jornadasData.find(function(x) { return x.id === jid; }); if (!j) return; j.clientes.push({ name: nombre, adults: parseInt(adEl ? adEl.value : 1) || 1, minors: parseInt(menEl ? menEl.value : 0) || 0, wa: waEl ? waEl.value.trim() : '', present: false, walkin: false }); renderJornadas(); showToast('Cliente añadido — pulsa Guardar para confirmar'); return; }
  if (action === 'deletecliente') { var jid = btn.getAttribute('data-jid'); var ci = parseInt(btn.getAttribute('data-ci')); var j = jornadasData.find(function(x) { return x.id === jid; }); if (!j) return; j.clientes.splice(ci, 1); renderJornadas(); showToast('Cliente eliminado — pulsa Guardar para confirmar'); return; }
});

document.addEventListener('change', function(e) {
  var el = e.target;
  if (!el.classList.contains('cliente-check')) return;
  var action = el.getAttribute('data-action');
  var gi = el.getAttribute('data-gi');
  if (action === 'presencia') { var pkey = el.getAttribute('data-pkey'); var jid2 = el.getAttribute('data-jid'); presencia[pkey] = el.checked; var row = el.closest('.cliente-row'); if (row) { row.classList.toggle('presente-row', el.checked); var nombreEl = row.querySelector('.cliente-edit-input.wide'); if (nombreEl) nombreEl.style.opacity = el.checked ? '0.5' : '1'; } updateStatPresentes(gi); if (jid2) scheduleAutoSave(jid2, gi); }
});

document.addEventListener('keydown', function(e) { if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') { doLogin(); } if (document.getElementById('pinInput') === document.activeElement) { document.getElementById('pinInput').classList.remove('error'); document.getElementById('loginError').textContent = ''; } });

document.getElementById('appFechaHoy').textContent = formatHoy();
document.getElementById('pinInput').focus();
</script>
