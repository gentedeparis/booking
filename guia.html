<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gente de París · Guía</title>
    <style>
        :root {
            --navy: #1B2B4B; --gold: #c9a84c; --noir: #0f0f0f;
            --charcoal: #1a1a1a; --white: #f5f2ec; --green: #27ae60;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--noir); color: var(--white); margin: 0; }
        .login-screen, .app-screen { display: none; padding: 20px; flex-direction: column; align-items: center; min-height: 100vh; }
        .active { display: flex; }
        
        /* Login */
        .card { background: var(--charcoal); padding: 30px; border-radius: 15px; width: 100%; max-width: 300px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1.2rem; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); color: var(--noir); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* App Layout */
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .jornada-card { background: var(--charcoal); width: 100%; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        .jornada-header { background: var(--navy); padding: 15px; }
        .cliente-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; gap: 15px; }
        .cliente-info { flex: 1; }
        .cliente-nombre.tachado { text-decoration: line-through; opacity: 0.5; }
        .check-btn { width: 30px; height: 30px; accent-color: var(--green); }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen active">
        <h1 style="color: var(--gold)">Gente de París</h1>
        <div class="card">
            <p>Introduce tu PIN</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4" inputmode="numeric">
            <button onclick="intentarLogin()">Entrar</button>
            <p id="loginError" style="color: #e74c3c; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="appScreen" class="app-screen">
        <header>
            <span id="guiaNombre" style="color: var(--gold); font-weight: bold;">Nombre</span>
            <button onclick="location.reload()" style="width: auto; padding: 5px 10px; font-size: 0.7rem;">Cerrar Sesión</button>
        </header>

        <h3 style="align-self: flex-start;">📋 Mis Jornadas de Hoy</h3>
        <div id="listaJornadas" style="width: 100%;">
            </div>
    </div>

    <script>
        // 1. PEGA TU URL DE IMPLEMENTACIÓN AQUÍ:
        var API = 'TU_URL_AQUÍ';
        
        var guiaActual = "";

        async function apiCall(params) {
            // Para obtener datos usamos GET (query params)
            const url = new URL(API);
            Object.keys(params).forEach(key => url.searchParams.set(key, params[key]));
            const response = await fetch(url);
            return await response.json();
        }

        async function intentarLogin() {
            const pin = document.getElementById('pinInput').value;
            const btn = document.querySelector('#loginScreen button');
            btn.innerText = "Verificando...";
            
            try {
                const res = await apiCall({ action: 'verificarPIN', pin: pin });
                if (res.ok) {
                    guiaActual = res.guia;
                    document.getElementById('guiaNombre').innerText = "👋 " + guiaActual;
                    document.getElementById('loginScreen').classList.remove('active');
                    document.getElementById('appScreen').classList.add('active');
                    cargarJornadas();
                } else {
                    document.getElementById('loginError').innerText = "PIN incorrecto o guía inactivo";
                }
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.innerText = "Entrar";
            }
        }

        async function cargarJornadas() {
            const container = document.getElementById('listaJornadas');
            container.innerHTML = "<p>Cargando lista...</p>";

            try {
                const jornadas = await apiCall({ action: 'getJornadasGuia', guia: guiaActual });
                
                if (jornadas.length === 0) {
                    container.innerHTML = "<p style='opacity:0.5'>No tienes jornadas para hoy.</p>";
                    return;
                }

                container.innerHTML = ""; // Limpiar
                jornadas.forEach(j => {
                    const clientes = JSON.parse(j.clientesJSON || "[]");
                    let htmlClientes = "";
                    
                    clientes.forEach((c, idx) => {
                        htmlClientes += `
                            <div class="cliente-row">
                                <input type="checkbox" class="check-btn" onchange="this.nextElementSibling.firstElementChild.classList.toggle('tachado')">
                                <div class="cliente-info">
                                    <div class="cliente-nombre">${c.nombre || c.name || 'Sin nombre'}</div>
                                    <div style="font-size: 0.7rem; color: var(--gold)">${c.adultos || c.adults || 0} AD / ${c.menores || c.minors || 0} MN</div>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML += `
                        <div class="jornada-card">
                            <div class="jornada-header">
                                <strong>${j.tourNombre}</strong><br>
                                <small>🕒 ${j.horario}h · 📅 ${j.fecha}</small>
                            </div>
                            ${htmlClientes || '<p style="padding:15px">No hay clientes registrados.</p>'}
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = "<p>Error al cargar datos.</p>";
            }
        }
    </script>
</body>
</html>
