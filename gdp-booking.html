<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Tour - Gente de París</title>
    <style>
        :root { --navy: #1B2B4B; --gold: #c9a84c; --white: #ffffff; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; }
        .tour-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--gold); }
        h1 { text-align: center; color: var(--navy); }
        .price { font-weight: bold; color: var(--gold); font-size: 1.2rem; }
        .btn-reserva { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Modal de reserva */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇫🇷 Gente de París</h1>
    <p style="text-align:center">Elige tu experiencia inolvidable</p>
    
    <div id="catalogo">
        <p style="text-align:center">Cargando tours...</p>
    </div>
</div>

<div id="modalReserva" class="modal">
    <div class="modal-content">
        <h3 id="modalTitulo">Reserva</h3>
        <input type="hidden" id="tourId">
        <input type="text" id="nombre" placeholder="Tu Nombre Completo">
        <input type="tel" id="whatsapp" placeholder="WhatsApp (con código de país)">
        <input type="date" id="fecha">
        <div style="display:flex; gap:10px">
            <input type="number" id="adultos" placeholder="Adultos" min="1">
            <input type="number" id="menores" placeholder="Niños" min="0">
        </div>
        <button class="btn-reserva" onclick="enviarReserva()">Confirmar Reserva</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer">Cancelar</button>
    </div>
</div>

<script>
    // 1. TU URL DE APPS SCRIPT AQUÍ:
    var API = 'TU_URL_AQUÍ';

    // Cargar Catálogo al iniciar
    window.onload = cargarTours;

    async function apiCall(params) {
        // Para lectura usamos GET
        const url = new URL(API);
        Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
        const response = await fetch(url);
        return await response.json();
    }

    async function postCall(params) {
        // Para escritura usamos POST
        const response = await fetch(API, {
            method: 'POST',
            body: JSON.stringify(params)
        });
        return await response.json();
    }

    async function cargarTours() {
        try {
            const tours = await apiCall({ action: 'getTours' });
            const catalogo = document.getElementById('catalogo');
            catalogo.innerHTML = "";

            tours.forEach(t => {
                catalogo.innerHTML += `
                    <div class="tour-card">
                        <h3>${t.nombre}</h3>
                        <p>${t.descripcion || 'Sin descripción'}</p>
                        <div class="price">${t.precio || '--'}€</div>
                        <button class="btn-reserva" onclick="abrirModal('${t.id}', '${t.nombre}')">Reservar Ahora</button>
                    </div>
                `;
            });
        } catch (e) {
            document.getElementById('catalogo').innerHTML = "Error al cargar el catálogo.";
        }
    }

    function abrirModal(id, nombre) {
        document.getElementById('tourId').value = id;
        document.getElementById('modalTitulo').innerText = nombre;
        document.getElementById('modalReserva').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modalReserva').style.display = 'none';
    }

    async function enviarReserva() {
        const data = {
            id: 'RES-' + Date.now(),
            tourId: document.getElementById('tourId').value,
            tourNombre: document.getElementById('modalTitulo').innerText,
            nombre: document.getElementById('nombre').value,
            whatsapp: document.getElementById('whatsapp').value,
            fecha: document.getElementById('fecha').value,
            adultos: document.getElementById('adultos').value,
            menores: document.getElementById('menores').value,
            timestamp: new Date().toISOString(),
            estado: 'pendiente'
        };

        if(!data.nombre || !data.fecha || !data.whatsapp) {
            alert("Por favor rellena los datos básicos.");
            return;
        }

        try {
            const res = await postCall({ action: 'saveReserva', data: data });
            if(res.ok) {
                alert("¡Gracias! Tu reserva ha sido recibida. Te contactaremos por WhatsApp.");
                cerrarModal();
            }
        } catch (e) {
            alert("Hubo un error al enviar la reserva.");
        }
    }
</script>
</body>
</html>
