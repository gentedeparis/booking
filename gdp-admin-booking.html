<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDP · Admin Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --noir: #0f0f0f;
    --charcoal: #1a1a1a;
    --graphite: #2c2c2c;
    --smoke: #3d3d3d;
    --muted: #888;
    --light: #c8c8c8;
    --white: #f5f2ec;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--noir);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  header {
    background: var(--charcoal);
    border-bottom: 1px solid var(--graphite);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--white); font-weight: 400; }
  .sync-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  nav {
    background: var(--charcoal);
    padding: 0 32px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--graphite);
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px 24px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--light); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  main { max-width: 1100px; margin: 0 auto; padding: 32px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* -- TOURS -- */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--white);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-gold { background: var(--gold); color: var(--noir); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-ghost { background: transparent; color: var(--light); border: 1px solid var(--graphite); }
  .btn-ghost:hover { border-color: var(--muted); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: var(--white); }
  .btn-success { background: var(--green); color: var(--white); }
  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

  .tours-grid { display: grid; gap: 16px; }
  .tour-card {
    background: var(--charcoal);
    border: 1px solid var(--graphite);
    border-radius: 10px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color 0.2s;
  }
  .tour-card:hover { border-color: var(--smoke); }
  .tour-card.inactive { opacity: 0.5; }
  .tour-emoji { font-size: 1.8rem; margin-bottom: 6px; }
  .tour-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    margin-bottom: 4px;
  }
  .tour-meta {
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
  }
  .tour-meta span { display: flex; align-items: center; gap: 4px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
  }
  .badge-green { background: rgba(39,174,96,0.2); color: #2ecc71; }
  .badge-red { background: rgba(192,57,43,0.2); color: #e74c3c; }
  .badge-gold { background: rgba(201,168,76,0.2); color: var(--gold); }

  .tour-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .dias-list { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .dia-chip {
    padding: 2px 8px;
    background: var(--graphite);
    border-radius: 20px;
    font-size: 0.72rem;
    color: var(--light);
  }

  /* -- MODAL -- */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--charcoal);
    border: 1px solid var(--graphite);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 24px;
    color: var(--gold);
  }
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input, textarea, select {
    width: 100%;
    background: var(--graphite);
    border: 1px solid var(--smoke);
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--graphite); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .dias-checkboxes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 4px;
  }
  .dia-check {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--graphite);
    border: 1px solid var(--smoke);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.82rem;
  }
  .dia-check input { width: auto; margin: 0; }
  .dia-check:has(input:checked) { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

  /* -- BLOQUEOS -- */
  .bloqueos-grid { display: grid; gap: 12px; }
  .bloqueo-card {
    background: var(--charcoal);
    border: 1px solid var(--graphite);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .bloqueo-info { flex: 1; }
  .bloqueo-fecha {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--white);
  }
  .bloqueo-detalle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  /* -- RESERVAS -- */
  .reservas-filter {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .reservas-filter input[type="date"] { width: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  thead tr {
    border-bottom: 1px solid var(--graphite);
  }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }
  td {
    padding: 12px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--light);
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  tr.cancelada td { opacity: 0.45; text-decoration: line-through; }
  tr.cancelada td:last-child { text-decoration: none; }
  .btn-cancelar { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-cancelar:hover { background: var(--gold); color: var(--noir); }
  .badge-cancelada { background: rgba(136,136,136,0.2); color: var(--muted); }
  .total-tag {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  /* loading */
  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .loading-overlay.open { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--graphite);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--charcoal);
    border: 1px solid var(--graphite);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 0.85rem;
    color: var(--white);
    z-index: 300;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* -- BANNER LIMPIEZA -- */
  .banner-limpieza {
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .banner-limpieza.aviso {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.4);
  }
  .banner-limpieza.ultimatum {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.6);
  }
  .banner-limpieza.critico {
    background: rgba(192,57,43,0.25);
    border: 2px solid var(--red);
  }
  .banner-icon { font-size: 1.8rem; flex-shrink: 0; }
  .banner-body { flex: 1; }
  .banner-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    margin-bottom: 4px;
  }
  .banner-aviso .banner-title { color: var(--gold); }
  .banner-ultimatum .banner-title, .banner-critico .banner-title { color: #e74c3c; }
  .banner-text { font-size: 0.83rem; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
  .banner-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .dias-checkboxes { grid-template-columns: repeat(3,1fr); }
    header { padding: 14px 16px; }
    nav { padding: 0 8px; }
    .tab-btn { padding: 12px 12px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Gente de París <span>· Admin</span></div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Conectando...</span>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('tours')">🗺 Tours</button>
  <button class="tab-btn" onclick="showTab('bloqueos')">🚫 Bloqueos</button>
  <button class="tab-btn" onclick="showTab('reservas')">📋 Reservas</button>
</nav>

<main>

  <!-- -- TAB TOURS -- -->
  <div class="tab-panel active" id="tab-tours">
    <div class="section-header">
      <h1 class="section-title">Tours</h1>
      <button class="btn btn-gold" onclick="openTourModal()">+ Nuevo tour</button>
    </div>
    <div class="tours-grid" id="toursGrid">
      <div class="empty-state"><div class="icon">⏳</div>Cargando tours...</div>
    </div>
  </div>

  <!-- -- TAB BLOQUEOS -- -->
  <div class="tab-panel" id="tab-bloqueos">
    <div class="section-header">
      <h1 class="section-title">Bloqueos</h1>
      <button class="btn btn-gold" onclick="openBloqueoModal()">+ Nuevo bloqueo</button>
    </div>
    <div class="bloqueos-grid" id="bloqueosGrid">
      <div class="empty-state"><div class="icon">⏳</div>Cargando bloqueos...</div>
    </div>
  </div>

  <!-- -- TAB RESERVAS -- -->
  <div class="tab-panel" id="tab-reservas">
    <div class="section-header">
      <h1 class="section-title">Reservas</h1>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost btn-sm" onclick="exportarCSV()">⬇ Exportar CSV</button>
        <button class="btn btn-ghost" onclick="loadReservas()">↻ Actualizar</button>
      </div>
    </div>
    <div id="bannerLimpieza"></div>
    <div class="reservas-filter">
      <input type="date" id="filtroFecha" onchange="renderReservas()">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filtroFecha').value='';renderReservas()">Ver todas</button>
    </div>
    <div id="reservasContainer">
      <div class="empty-state"><div class="icon">⏳</div>Cargando reservas...</div>
    </div>
  </div>

</main>

<!-- -- MODAL TOUR -- -->
<div class="modal-overlay" id="tourModal">
  <div class="modal">
    <div class="modal-title" id="tourModalTitle">Nuevo Tour</div>
    <div class="form-group">
      <label>Nombre del tour</label>
      <input type="text" id="tNombre" placeholder="Tour Montmartre">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="tDesc" placeholder="Breve descripción del tour..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Horario (ej: 10:00)</label>
        <input type="time" id="tHorario">
      </div>
      <div class="form-group">
        <label>Precio por persona (€)</label>
        <input type="number" id="tPrecio" min="0" step="0.5">
      </div>
    </div>
    <div class="form-group">
      <label>Cupo máximo</label>
      <input type="number" id="tCupo" min="1" value="15">
    </div>
    <div class="form-group">
      <label>Punto de encuentro (dirección)</label>
      <input type="text" id="tDireccion" placeholder="Ej: Plaza de la Bastilla, frente a la columna">
    </div>
    <div class="form-group">
      <label>Link Google Maps</label>
      <input type="url" id="tMapsLink" placeholder="https://maps.google.com/...">
    </div>
    <div class="form-group">
      <label>Días disponibles</label>
      <div class="dias-checkboxes">
        <label class="dia-check"><input type="checkbox" name="dia" value="lun"> Lun</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="mar"> Mar</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="mie"> Mié</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="jue"> Jue</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="vie"> Vie</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="sab"> Sáb</label>
        <label class="dia-check"><input type="checkbox" name="dia" value="dom"> Dom</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTourModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveTour()">Guardar tour</button>
    </div>
  </div>
</div>

<!-- -- MODAL BLOQUEO -- -->
<div class="modal-overlay" id="bloqueoModal">
  <div class="modal">
    <div class="modal-title">Nuevo Bloqueo</div>
    <div class="form-group">
      <label>Fecha a bloquear</label>
      <input type="date" id="bFecha">
    </div>
    <div class="form-group">
      <label>¿Qué bloquear?</label>
      <select id="bTourId">
        <option value="all">🚫 Todos los tours (fecha completa)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Motivo (opcional)</label>
      <input type="text" id="bMotivo" placeholder="Festivo, vacaciones...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBloqueoModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveBloqueo()">Bloquear fecha</button>
    </div>
  </div>
</div>

<!-- Loading & Toast -->
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzublsoEo4DlJ0QIEbuH86iC-Ztjzxuj6UO4Z1YMmHBqDcAaQsVdOr1a5pE2rS_06gk/exec';
const DIAS_MAP = { lun:'Lun', mar:'Mar', mie:'Mié', jue:'Jue', vie:'Vie', sab:'Sáb', dom:'Dom' };
const DIAS_NUM = { 0:'dom', 1:'lun', 2:'mar', 3:'mie', 4:'jue', 5:'vie', 6:'sab' };

let tours = [], bloqueos = [], reservas = [];
let editingTourId = null;


// -- NORMALIZAR DATOS DE GOOGLE SHEETS --
function normalizarFecha(val) {
  if (!val) return '';
  const s = String(val);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  try {
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
  } catch(e) {}
  return s;
}

function normalizarHorario(val) {
  if (!val) return '';
  const s = String(val);
  if (/^\d{1,2}:\d{2}$/.test(s)) return s;
  try {
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      const h = String(d.getUTCHours()).padStart(2,'0');
      const min = String(d.getUTCMinutes()).padStart(2,'0');
      return `${h}:${min}`;
    }
  } catch(e) {}
  return s;
}

// -- API helpers --
async function apiCall(params) {
  // Todo por GET - es lo más estable con Google Apps Script desde dominios externos
  const url = new URL(API);
  Object.entries(params).forEach(([k, v]) => {
    url.searchParams.set(k, typeof v === 'object' ? JSON.stringify(v) : v);
  });
  const res = await fetch(url.toString());
  const text = await res.text();
  let result;
  try { result = JSON.parse(text); }
  catch(e) { throw new Error('Respuesta no-JSON: ' + text.slice(0, 300)); }
  if (result && result.error) throw new Error(result.error);
  return result;
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

function showLoading() { document.getElementById('loadingOverlay').classList.add('open'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('open'); }

function showToast(msg, type='success', duration=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), duration);
}

// -- TABS --
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'reservas') loadReservas();
}

// -- TOURS --
async function loadTours() {
  setSyncStatus('loading', 'Cargando...');
  try {
    const resp = await apiCall({ action: 'getTours' });
    tours = (Array.isArray(resp) ? resp.filter(t => t && t.id) : []).map(t => ({
      ...t,
      horario: normalizarHorario(t.horario)
    }));
    renderTours();
    populateTourSelect();
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    setSyncStatus('error', 'Error');
    showToast('Error: ' + (e.message || e), 'error');
    console.error('loadTours:', e);
  }
}

function renderTours() {
  const grid = document.getElementById('toursGrid');
  if (!tours.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🗺</div>No hay tours todavía. Crea el primero.</div>';
    return;
  }
  grid.innerHTML = tours.filter(t => t && t.id).map(t => {
    const dias = t.dias ? t.dias.split(',').map(d => `<span class="dia-chip">${DIAS_MAP[d.trim()]||d}</span>`).join('') : '';
    const activo = t.activo === true || t.activo === 'true' || t.activo === 'TRUE';
    return `
    <div class="tour-card ${activo?'':'inactive'}">
      <div>
        <div class="tour-name">${t.nombre}</div>
        <div style="font-size:0.82rem;color:var(--muted);margin-top:4px">${t.descripcion||''}</div>
        <div class="tour-meta">
          <span>🕐 ${t.horario||'--'}</span>
          <span>👥 Cupo: ${t.cupo}</span>
          <span>💶 ${t.precio}€/p</span>
          <span class="badge ${activo?'badge-green':'badge-red'}">${activo?'Activo':'Pausado'}</span>
        </div>
        <div class="dias-list">${dias}</div>
      </div>
      <div class="tour-actions">
        <button class="btn btn-ghost btn-sm" onclick="openTourModal('${t.id}')">✏️ Editar</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleTour('${t.id}')">${activo?'⏸ Pausar':'▶ Activar'}</button>
      </div>
    </div>`;
  }).join('');
}

function openTourModal(id) {
  editingTourId = id || null;
  const modal = document.getElementById('tourModal');
  document.getElementById('tourModalTitle').textContent = id ? 'Editar Tour' : 'Nuevo Tour';
  document.querySelectorAll('input[name="dia"]').forEach(c => c.checked = false);

  if (id) {
    const t = tours.find(x => String(x.id) == String(id));
    if (t) {

      document.getElementById('tNombre').value = t.nombre||'';
      document.getElementById('tDesc').value = t.descripcion||'';
      document.getElementById('tHorario').value = t.horario||'';
      document.getElementById('tPrecio').value = t.precio||'';
      document.getElementById('tCupo').value = t.cupo||'15';
      document.getElementById('tDireccion').value = t.direccion||'';
      document.getElementById('tMapsLink').value = t.mapsLink||'';
      if (t.dias) t.dias.split(',').forEach(d => {
        const cb = document.querySelector(`input[name="dia"][value="${d.trim()}"]`);
        if (cb) cb.checked = true;
      });
    }
  } else {

    document.getElementById('tNombre').value = '';
    document.getElementById('tDesc').value = '';
    document.getElementById('tHorario').value = '';
    document.getElementById('tPrecio').value = '';
    document.getElementById('tCupo').value = '15';
    document.getElementById('tDireccion').value = '';
    document.getElementById('tMapsLink').value = '';
  }
  modal.classList.add('open');
}
function closeTourModal() { document.getElementById('tourModal').classList.remove('open'); }

async function saveTour() {
  try {
    const nombre = document.getElementById('tNombre').value.trim();
    if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
    const dias = [...document.querySelectorAll('input[name="dia"]:checked')].map(c=>c.value).join(',');
    if (!dias) { showToast('Selecciona al menos un día', 'error'); return; }

    const tourid = editingTourId || ('tour_' + Date.now());
    const tourActual = editingTourId ? tours.find(x => String(x.id) === String(editingTourId)) : null;

    const tour = {
      id: tourid,
      nombre: nombre,
      descripcion: document.getElementById('tDesc').value.trim(),
      dias: dias,
      horario: document.getElementById('tHorario').value,
      cupo: parseInt(document.getElementById('tCupo').value) || 15,
      precio: parseFloat(document.getElementById('tPrecio').value) || 0,
      direccion: document.getElementById('tDireccion').value.trim(),
      mapsLink: document.getElementById('tMapsLink').value.trim(),
      activo: tourActual ? String(tourActual.activo) : 'true'
    };

    console.log('Guardando tour:', JSON.stringify(tour));
    showLoading();
    const result = await apiCall({ action: 'saveTour', data: tour });
    console.log('Respuesta saveTour:', result);
    closeTourModal();
    await loadTours();
    showToast(editingTourId ? 'Tour actualizado ✓' : 'Tour creado ✓');
  } catch(e) {
    const msg = e.message || String(e);
    showToast(msg, 'error', 6000);
    console.error('saveTour error completo:', e);
  }
  hideLoading();
}

async function toggleTour(id) {
  const t = tours.find(x => String(x.id) == String(id));
  if (!t) return;
  const activo = t.activo === true || t.activo === 'true' || t.activo === 'TRUE';
  t.activo = !activo ? 'true' : 'false';
  showLoading();
  try {
    await apiCall({ action: 'saveTour', data: t });
    await loadTours();
    showToast('Estado actualizado ✓');
  } catch(e) {
    showToast('Error al actualizar', 'error');
  }
  hideLoading();
}

// -- BLOQUEOS --
async function loadBloqueos() {
  try {
    const rawBlq = await apiCall({ action: 'getBloqueos' });
    bloqueos = (Array.isArray(rawBlq) ? rawBlq : []).map(b => ({
      ...b,
      fecha: normalizarFecha(b.fecha)
    }));
    renderBloqueos();
  } catch(e) {
    showToast('Error al cargar bloqueos', 'error');
  }
}

function renderBloqueos() {
  const grid = document.getElementById('bloqueosGrid');
  const sorted = [...bloqueos].sort((a,b) => a.fecha > b.fecha ? 1 : -1);
  if (!sorted.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">✅</div>No hay bloqueos activos.</div>';
    return;
  }
  grid.innerHTML = sorted.map(b => {
    const tourNombre = b.tourId === 'all' ? 'Todos los tours' : (tours.find(t=>t.id==b.tourId)?.nombre || b.tourId);
    return `
    <div class="bloqueo-card">
      <div class="bloqueo-info">
        <div class="bloqueo-fecha">📅 ${formatDate(b.fecha)}</div>
        <div class="bloqueo-detalle">🚫 ${tourNombre}${b.motivo ? ' - ' + b.motivo : ''}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteBloqueo('${b.id}')">Eliminar</button>
    </div>`;
  }).join('');
}

function populateTourSelect() {
  const sel = document.getElementById('bTourId');
  sel.innerHTML = '<option value="all">🚫 Todos los tours (fecha completa)</option>';
  tours.filter(t => t.activo === 'true' || t.activo === true || t.activo === 'TRUE').forEach(t => {
    sel.innerHTML += `<option value="${t.id}">${t.emoji||''} ${t.nombre}</option>`;
  });
}

function openBloqueoModal() {
  document.getElementById('bFecha').value = '';
  document.getElementById('bMotivo').value = '';
  document.getElementById('bloqueoModal').classList.add('open');
}
function closeBloqueoModal() { document.getElementById('bloqueoModal').classList.remove('open'); }

async function saveBloqueo() {
  const fecha = document.getElementById('bFecha').value;
  if (!fecha) { showToast('Selecciona una fecha', 'error'); return; }
  const bloqueo = {
    id: 'blq_' + Date.now(),
    fecha,
    tourId: document.getElementById('bTourId').value,
    motivo: document.getElementById('bMotivo').value.trim(),
    timestamp: new Date().toISOString()
  };
  showLoading();
  try {
    await apiCall({ action: 'saveBloqueo', data: bloqueo });
    closeBloqueoModal();
    await loadBloqueos();
    showToast('Fecha bloqueada ✓');
  } catch(e) {
    showToast('Error al guardar bloqueo', 'error');
  }
  hideLoading();
}

async function deleteBloqueo(id) {
  if (!confirm('¿Eliminar este bloqueo?')) return;
  showLoading();
  try {
    await apiCall({ action: 'deleteBloqueo', id });
    await loadBloqueos();
    showToast('Bloqueo eliminado ✓');
  } catch(e) {
    showToast('Error al eliminar', 'error');
  }
  hideLoading();
}

// -- RESERVAS --
async function loadReservas() {
  setSyncStatus('loading', 'Actualizando...');
  try {
    const rawRes = await apiCall({ action: 'getReservas' });
    reservas = (Array.isArray(rawRes) ? rawRes : []).map(r => ({
      ...r,
      fecha: normalizarFecha(r.fecha),
      horario: normalizarHorario(r.horario)
    }));
    renderReservas();
    evaluarLimpieza();
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    setSyncStatus('error', 'Error');
    showToast('Error al cargar reservas', 'error');
  }
}

function renderReservas() {
  const filtro = document.getElementById('filtroFecha').value;
  const lista = filtro ? reservas.filter(r => r.fecha === filtro) : reservas;
  const container = document.getElementById('reservasContainer');
  if (!lista.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No hay reservas' + (filtro ? ' para esta fecha.' : ' todavía.') + '</div>';
    return;
  }
  const sorted = [...lista].sort((a,b) => b.timestamp > a.timestamp ? 1 : -1);
  container.innerHTML = `
  <table>
    <thead><tr>
      <th>Fecha</th><th>Tour</th><th>Horario</th><th>Cliente</th><th>WhatsApp</th><th>Pax</th><th>Total</th><th>Estado</th><th></th>
    </tr></thead>
    <tbody>
      ${sorted.map(r => {
        const cancelada = r.estado === 'cancelada';
        return `
        <tr class="${cancelada ? 'cancelada' : ''}">
          <td>${formatDate(r.fecha)}</td>
          <td>${r.tourNombre||''}</td>
          <td>${r.horario||''}</td>
          <td>${r.nombre||''}</td>
          <td><a href="https://wa.me/${r.whatsapp}" target="_blank" style="color:var(--gold);text-decoration:none">📱 ${r.whatsapp}</a></td>
          <td>${r.adultos||0}A ${r.menores||0}M</td>
          <td><span class="total-tag">${r.total||0}€</span></td>
          <td>${cancelada ? '<span class="badge badge-cancelada">Cancelada</span>' : '<span class="badge badge-green">Confirmada</span>'}</td>
          <td style="white-space:nowrap;display:flex;gap:6px;padding:8px 12px">
            ${!cancelada ? `<button class="btn btn-cancelar btn-sm" onclick="cancelarReserva('${r.id}','${r.nombre}','${r.whatsapp}','${r.fecha}','${r.tourNombre}')">✕ Cancelar</button>` : ''}
            <button class="btn btn-danger btn-sm" onclick="eliminarReserva('${r.id}')">🗑</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

// -- ACCIONES RESERVAS --
async function eliminarReserva(id) {
  if (!confirm('¿Eliminar esta reserva definitivamente? Esta acción no se puede deshacer.')) return;
  showLoading();
  try {
    await apiCall({ action: 'deleteReserva', id });
    await loadReservas();
    showToast('Reserva eliminada ✓');
  } catch(e) {
    showToast('Error al eliminar: ' + (e.message||e), 'error');
  }
  hideLoading();
}

async function cancelarReserva(id, nombre, whatsapp, fecha, tourNombre) {
  if (!confirm(`¿Cancelar la reserva de ${nombre}? Se abrirá WhatsApp para notificarle.`)) return;
  showLoading();
  try {
    await apiCall({ action: 'cancelReserva', id });
    await loadReservas();
    showToast('Reserva cancelada ✓');
    // Abrir WhatsApp al cliente con mensaje automático
    const msg = encodeURIComponent(
      `Hola ${nombre} 👋\n\nTe escribimos desde *Gente de París* para informarte que tu reserva ha sido *cancelada*:\n\n` +
      `📅 Fecha: ${formatDate(fecha)}\n🎯 Tour: ${tourNombre}\n\n` +
      `Lamentamos los inconvenientes. Si tienes alguna pregunta o quieres reagendar, estamos a tu disposición. ¡Hasta pronto! 🗼`
    );
    const wa = whatsapp.replace(/[^0-9]/g,'');
    window.open('https://wa.me/' + wa + '?text=' + msg, '_blank');
  } catch(e) {
    showToast('Error al cancelar: ' + (e.message||e), 'error');
  }
  hideLoading();
}

// -- UTILS --
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

// -- LIMPIEZA AUTOMÁTICA --
const DIAS_AVISO = 15;
const DIAS_ULTIMATUM = 20;
const DIAS_BORRADO_AUTO = 25;
const LS_KEY = 'gdp_limpieza_v1';

function getLimpiezaState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { return {}; }
}
function setLimpiezaState(obj) {
  localStorage.setItem(LS_KEY, JSON.stringify(obj));
}

function getReservasAntiguas() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return reservas.filter(r => {
    if (!r.fecha) return false;
    const fecha = new Date(r.fecha + 'T00:00:00');
    const dias = Math.floor((hoy - fecha) / (1000*60*60*24));
    return dias >= DIAS_AVISO;
  });
}

function formatDateCSV(str) {
  if (!str) return '';
  const [y,m,d] = String(str).split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)}-${months[parseInt(m)-1]}-${y}`;
}

function exportarCSV(soloAntiguas) {
  const lista = soloAntiguas ? getReservasAntiguas() : reservas;
  if (!lista.length) { showToast('No hay reservas para exportar', 'error'); return; }

  const sorted = [...lista].sort(function(a,b) {
    return String(a.fecha) > String(b.fecha) ? 1 : -1;
  });

  const primera = formatDateCSV(sorted[0].fecha);
  const ultima = formatDateCSV(sorted[sorted.length-1].fecha);
  const nombre = 'reservas_' + primera + '_al_' + ultima + '.csv';

  const headers = ['ID','Fecha','Tour','Horario','Cliente','WhatsApp','Adultos','Menores','Total','Estado','Timestamp'];

  function escaparCSV(val) {
    return '"' + String(val).replace(/"/g, '""') + '"';
  }

  const filas = sorted.map(function(r) {
    return [
      r.id||'', r.fecha||'', r.tourNombre||'', r.horario||'',
      r.nombre||'', r.whatsapp||'', r.adultos||0, r.menores||0,
      r.total||0, r.estado||'confirmada', r.timestamp||''
    ].map(escaparCSV).join(',');
  });

  const lineas = [headers.join(',')].concat(filas).join('\r\n');
  const bom = String.fromCharCode(0xFEFF);
  const blob = new Blob([bom + lineas], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nombre;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  return nombre;
}

async function borrarReservasAntiguas() {
  const antiguas = getReservasAntiguas();
  showLoading();
  let errores = 0;
  for (const r of antiguas) {
    try {
      await apiCall({ action: 'deleteReserva', id: r.id });
    } catch(e) { errores++; }
  }
  hideLoading();
  return errores;
}

async function accionDescargarYLimpiar() {
  const antiguas = getReservasAntiguas();
  if (!antiguas.length) { showToast('No hay reservas antiguas', 'error'); return; }

  // 1. Exportar CSV
  exportarCSV(true);

  // 2. Confirmar borrado
  setTimeout(async () => {
    const ok = confirm(`Se ha descargado el CSV con ${antiguas.length} reservas.

¿Confirmar eliminación de estas reservas de la base de datos?`);
    if (!ok) return;

    const errores = await borrarReservasAntiguas();
    if (errores === 0) {
      setLimpiezaState({ ultimaLimpieza: new Date().toISOString() });
      await loadReservas();
      document.getElementById('bannerLimpieza').innerHTML = '';
      showToast(`${antiguas.length} reservas archivadas y eliminadas ✓`);
    } else {
      showToast('Algunas reservas no se pudieron eliminar. Inténtalo de nuevo.', 'error');
    }
  }, 800);
}

async function borradoAutomatico() {
  const antiguas = getReservasAntiguas();
  if (!antiguas.length) return;
  const errores = await borrarReservasAntiguas();
  if (errores === 0) {
    setLimpiezaState({ ultimaLimpieza: new Date().toISOString() });
    await loadReservas();
    document.getElementById('bannerLimpieza').innerHTML = '';
    showToast('Reservas antiguas eliminadas automáticamente (sin copia)', 'error');
  }
}

function evaluarLimpieza() {
  const antiguas = getReservasAntiguas();
  if (!antiguas.length) return;

  const state = getLimpiezaState();
  const hoy = new Date();

  // Verificar si ya se limpió recientemente (menos de 15 días)
  if (state.ultimaLimpieza) {
    const diasDesde = Math.floor((hoy - new Date(state.ultimaLimpieza)) / (1000*60*60*24));
    if (diasDesde < DIAS_AVISO) return; // aún no toca
  }

  // Calcular la reserva más antigua
  const sorted = [...antiguas].sort((a,b) => String(a.fecha) > String(b.fecha) ? 1 : -1);
  const fechaMasAntigua = new Date(sorted[0].fecha + 'T00:00:00');
  const diasAntiguedad = Math.floor((hoy - fechaMasAntigua) / (1000*60*60*24));

  const banner = document.getElementById('bannerLimpieza');

  if (diasAntiguedad >= DIAS_BORRADO_AUTO) {
    // Borrado automático silencioso
    banner.innerHTML = '<div class="banner-limpieza critico"><div class="banner-icon">🚨</div><div class="banner-body"><div class="banner-title" style="color:#e74c3c">Borrado automático en curso...</div><div class="banner-text">Se superaron los 25 días sin archivar. Eliminando reservas antiguas sin copia.</div></div></div>';
    setTimeout(() => borradoAutomatico(), 1500);
    return;
  }

  if (diasAntiguedad >= DIAS_ULTIMATUM) {
    // Ultimátum - 5 días para actuar
    const diasRestantes = DIAS_BORRADO_AUTO - diasAntiguedad;
    banner.innerHTML = `
    <div class="banner-limpieza ultimatum">
      <div class="banner-icon">🚨</div>
      <div class="banner-body">
        <div class="banner-title" style="color:#e74c3c">⚠️ ÚLTIMO AVISO - Borrado automático en ${diasRestantes} día${diasRestantes!==1?'s':''}</div>
        <div class="banner-text">
          Tienes <strong style="color:#e74c3c">${antiguas.length} reservas</strong> con más de ${DIAS_ULTIMATUM} días sin archivar.<br>
          Si no actúas en <strong>${diasRestantes} día${diasRestantes!==1?'s':''}</strong>, se eliminarán <strong>definitivamente y sin copia de seguridad</strong>.
        </div>
        <div class="banner-actions">
          <button class="btn btn-gold" onclick="accionDescargarYLimpiar()">⬇ Descargar CSV y limpiar ahora</button>
        </div>
      </div>
    </div>`;
    return;
  }

  // Aviso normal - a partir de 15 días
  banner.innerHTML = `
  <div class="banner-limpieza aviso">
    <div class="banner-icon">🗂</div>
    <div class="banner-body">
      <div class="banner-title" style="color:var(--gold)">Hay reservas para archivar</div>
      <div class="banner-text">
        Tienes <strong>${antiguas.length} reservas</strong> con más de ${DIAS_AVISO} días.<br>
        Puedes descargarlas como CSV y limpiar la base de datos.<br>
        <em style="font-size:0.78rem">Si no actúas en ${DIAS_BORRADO_AUTO - diasAntiguedad} días, se eliminarán automáticamente.</em>
      </div>
      <div class="banner-actions">
        <button class="btn btn-gold" onclick="accionDescargarYLimpiar()">⬇ Descargar CSV y limpiar</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('bannerLimpieza').innerHTML=''">Recordármelo luego</button>
      </div>
    </div>
  </div>`;
}

// -- INIT --
async function init() {
  setSyncStatus('loading', 'Conectando...');
  await loadTours();
  await loadBloqueos();
}
init();
</script>
